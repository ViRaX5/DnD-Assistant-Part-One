<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DnD Assistant - Campaigns</title>
    <link rel="stylesheet" href="./css/campaignListStyle.css" />
    <script type="text/javascript" src="./js/campgain-list.js" defer></script>
  </head>

  <body>
    <div id="wrapper">
      <header>
        <div class="image-container">
          <a href="campaignList.html">
            <img
              class="logo"
              src="./images/D&DLogoTransparent.png"
              alt="Home"
            />
          </a>
        </div>
        <nav>
          <div class="filters">
            <button type="button" class="DM not-clicked">DM</button>
            <button type="button" class="player not-clicked">Player</button>
            <button type="button" class="log-out">Log Out</button>
            <dialog id="logout-modal">
              <div class="modal-content">
                <h2>Ending the Adventure</h2>
                <p>Are you sure you want to log out?</p>
                <div class="modal-buttons">
                  <button
                    type="button"
                    id="cancel-logout"
                    class="cancel-button"
                  >
                    Cancel
                  </button>
                  <button
                    type="button"
                    id="confirm-logout"
                    class="confirm-button"
                  >
                    Yes, Log Out
                  </button>
                </div>
              </div>
            </dialog>
          </div>
        </nav>
      </header>
      <div class="main-section">
        <h2>Your Campaigns</h2>
        <div class="campaigns-section">
          <div class="no-campaigns-container"></div>
          <div class="campaigns-container"></div>
          <div class="buttons-placeholder"></div>
        </div>
      </div>
    </div>
  </body>
</html>
